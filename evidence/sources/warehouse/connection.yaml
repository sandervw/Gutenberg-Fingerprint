# DuckDB source over the gold marts. nb_export_gold writes them to parquet in
# OneLake; the prebuild step (scripts/) downloads those into this folder with a
# service-principal token. ':memory:' = no persistent db - each query reads the
# local parquet directly, so the build never touches the Warehouse and rebuilds
# even while capacity is paused.
name: warehouse
type: duckdb
options:
  filename: ':memory:'
