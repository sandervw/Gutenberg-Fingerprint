# Fabric Warehouse SQL endpoint (same host as dbt/profiles.yml fabric target).
# Local: azure-active-directory-default picks up `az login`. CI overrides auth
# via EVIDENCE_SOURCE__warehouse__* env vars (service principal), no yaml fork.
# Capacity must be running when `npm run sources` extracts.
# Option keys are the connector's snake_case names, not mssql's camelCase.
name: warehouse
type: mssql
options:
  server: fr7xv35iil4ehegy7wuqkoukpi-ja423pz3n3vu5dxbjbpa6r6ipm.datawarehouse.fabric.microsoft.com
  database: wh_gold
  authenticationType: azure-active-directory-default
  encrypt: true
  trust_server_certificate: false
  connection_timeout: 30000
  request_timeout: 60000
