version: 2

models:
  - name: stg_works
    description: "One row per work (689): catalog fields off silver raw_works plus derived corpus flags. Flagged works stay in; Evidence filters at query time."
    columns:
      - name: gutenberg_id
        description: "PG's natural key. PK + grain guard."
        data_tests:
          - unique
          - not_null
      - name: title
        data_tests:
          - not_null
      - name: is_translation
        description: "'[Translator]' author marker, 'Translations into English' subject, or foreign-literature LoC class (PA/PG/PH/PJ/PK/PL/PQ/PT). ~35 works."
        data_tests:
          - not_null
      - name: is_juvenile
        description: "PZ LoC class or 'juvenile' subject keyword. ~256 works."
        data_tests:
          - not_null
      - name: is_play
        description: "'drama'/'plays' subject keyword or Plays/Films/Dramas bookshelf. Script formatting poisons prose stylometrics. ~14 works."
        data_tests:
          - not_null
      - name: is_poetry
        description: "'poetry' subject keyword. Bookshelf Category: Poetry deliberately excluded (tags prose Poe/Dunsany collections). Misses verse epics subject-tagged as saga only (13486/18328). ~17 works."
        data_tests:
          - not_null
