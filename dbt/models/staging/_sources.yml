version: 2

sources:
  - name: raw
    # Target-aware source location. Fabric: wh_gold reads lh_silver's tables
    database: "{{ 'lh_silver' if target.name == 'fabric' else 'warehouse' }}"
    schema: "{{ 'dbo' if target.name == 'fabric' else 'raw' }}"
    loader: "extract/ (Python + spaCy)" # the pipeline that fills these tables; shows in lineage
    description: "Tidy tables landed by the standalone Python extractor (extract/)."
    config:
      loaded_at_field: loaded_at
      freshness:
        error_after: { count: 24, period: hour }
    tables:
      - name: raw_works # grain: one row per work
      - name: raw_measurements # grain: one row per work × metric (tidy/long)
      - name: raw_vocab # grain: one row per work × content-word term
