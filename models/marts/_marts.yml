version: 2

models:
  - name: dim_metric
    description: "One row per metric concept (15). Pass-through of seed_metrics + surrogate key."
    columns:
      - name: metric_key
        description: "Surrogate hash of metric_name. Facts join on this, not the free-text name."
        data_tests:
          - unique
          - not_null
      - name: additivity
        description: "Kimball additivity class. All 15 metrics are non-additive (ratios/averages/indices); value + zscore must never be summed across rows."
        data_tests:
          - accepted_values:
              arguments:
                values: ["additive", "semi-additive", "non-additive"]

  - name: dim_author
    description: "One row per author: catalog primary authors (stg_works.author_name) plus the self row off the seed."
    columns:
      - name: author_key
        description: "Surrogate hash of author name."
        data_tests:
          - unique # fails loudly if a catalog name collides with the seed self row
          - not_null

  - name: dim_work
    description: "One row per work: catalog works (stg_works) + self corpus (seed_authors)."
    columns:
      - name: work_key
        description: "Surrogate hash of work_id."
        data_tests:
          - unique
          - not_null
      - name: word_count
        description: "Alpha-token count off raw_measurements' word_count series; null for works the measure notebook hasn't landed."
        data_tests:
          - not_null: # warn keeps the gap visible without failing the build
              config:
                severity: warn
      - name: author_key
        description: "FK to dim_author."
        data_tests:
          - not_null
          - relationships: # every work's author must exist in dim_author
              arguments:
                to: ref('dim_author')
                field: author_key
      - name: prose_type
        description: "Size band off word_count (<10k short-story, <40k novella, else novel); null when unmeasured."
        data_tests:
          - accepted_values:
              arguments:
                values: ["short-story", "novella", "novel"]

  - name: fact_style_measurement
    description: "Central fact: one row per work x metric series. Incremental on loaded_at; carries the raw value, FKs to dim_work, dim_author, and dim_metric. Z-scores computed in the marts."
    columns:
      - name: measurement_key
        description: "Surrogate hash of (work_id, metric_name). PK + grain guard."
        data_tests:
          - unique # fails if (work, series) ever duplicates -> grain broken
          - not_null
      - name: work_key
        description: "FK to dim_work."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_work')
                field: work_key
      - name: author_key
        description: "FK to dim_author, carried direct off dim_work for star-schema slicing."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_author')
                field: author_key
      - name: metric_key
        description: "FK to dim_metric (concept grain; one key spans a multivalue concept's child series)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_metric')
                field: metric_key
      - name: loaded_at
        description: "Ingestion timestamp; the incremental watermark."
        data_tests:
          - not_null

  - name: fact_vocab_overlap
    description: "Author-pair fact: you (author_key_a) vs each other author (author_key_b), with Jaccard vocabulary overlap. Jaccard reads 0 until the self corpus lands in the lakehouse."
    columns:
      - name: overlap_key
        description: "Surrogate hash of (author_key_a, author_key_b). PK + grain guard."
        data_tests:
          - unique
          - not_null
      - name: author_key_a
        description: "FK to dim_author -- you (the is_self side)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_author')
                field: author_key
      - name: author_key_b
        description: "FK to dim_author -- the other author. Unique = exactly one pair per other author."
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_author')
                field: author_key
      - name: jaccard
        description: "|A∩B| / |A∪B|. A proper fraction, so must sit in [0, 1]."
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true

  - name: mart_work_fingerprint
    description: "Wide pivot of fact_style_measurement: one row per work, a z-score column per series (63)."
    columns:
      - name: work_key
        description: "PK + grain guard (one row per work)."
        data_tests:
          - unique
          - not_null
      - name: author_key
        description: "FK to dim_author; the handle for rolling works up to author."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_author')
                field: author_key

  - name: mart_style_long
    description: "Report-serving OBT: fact_style_measurement denormalized against its dims, kept long, with a precomputed series_label. Feeds the Evidence pages so they don't re-join the star."
    data_tests:
      - dbt_utils.unique_combination_of_columns: # grain = work x child series
          arguments:
            combination_of_columns:
              - work_key
              - metric_name
    columns:
      - name: work_key
        description: "FK to dim_work."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_work')
                field: work_key
      - name: author_key
        description: "FK to dim_author."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_author')
                field: author_key
      - name: metric_key
        description: "FK to dim_metric (concept grain)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_metric')
                field: metric_key
      - name: value
        description: "Raw measured value. Non-additive."
        data_tests:
          - not_null
