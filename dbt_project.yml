name: "gutenberg_fingerprint"
version: "1.0.0"

# Which "profile" dbt uses for this project.
profile: "gutenberg_fingerprint"

# Where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Audit log: every run/build/test writes one row per node to dbt_run_log
on-run-end: "{{ log_run_results(results) }}"

clean-targets: # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# https://docs.getdbt.com/docs/configuring-models
# staging/int → views (recomputed on read)
# marts → tables (queried often)
# Override per-model with `{{ config(...) }}`
models:
  gutenberg_fingerprint:
    staging:
      +materialized: view
    intermediate:
      +materialized: view # inspectable + testable; switch to ephemeral if we ever want a tidy warehouse
    marts:
      +materialized: table

# Load seeds via INSERT, not dbt-duckdb's fast COPY-from-file, whose path is
# resolved against the shell's CWD and breaks when run from inside the project.
seeds:
  gutenberg_fingerprint:
    +fast: false
